<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas · Doutor Paladar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .rodape-link {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            text-align: right;
        }
        
        .rodape-link a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f1f5f9;
            color: #dc2626;
            text-decoration: none;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .rodape-link a:hover {
            background: #dc2626;
            color: white;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <h1><i class="fas fa-receipt"></i> Controle de Despesas</h1>
                <p>Doutor Paladar · Gestão Financeira</p>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="pdv.html" class="nav-link"><i class="fas fa-cash-register"></i> PDV</a>
                <a href="estoque.html" class="nav-link"><i class="fas fa-box"></i> Estoque</a>
                <a href="fiado.html" class="nav-link"><i class="fas fa-hand-holding-usd"></i> Fiado</a>
                <a href="desempenhos.html" class="nav-link"><i class="fas fa-gauge-high"></i> Desempenhos</a>
                <a href="despesas.html" class="nav-link active"><i class="fas fa-receipt"></i> Despesas</a>
                <button class="btn btn-secondary" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </nav>
        </header>

        <div class="grid-2">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-plus-circle"></i> Registrar Despesa</h3>
                </div>
                <form id="despesaForm">
                    <div class="form-group">
                        <label>Descrição *</label>
                        <input type="text" id="descricao" class="form-control" required placeholder="Ex: Compra de farinha">
                    </div>
                    <div class="form-group">
                        <label>Categoria</label>
                        <select id="categoria" class="form-control">
                            <option value="Insumos">Insumos (ingredientes)</option>
                            <option value="Material Limpeza">Material de Limpeza</option>
                            <option value="Descartáveis">Descartáveis</option>
                            <option value="Manutenção">Manutenção</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$) *</label>
                        <input type="number" id="valor" class="form-control" required min="0.01" step="0.01" placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" id="data" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Registrar Despesa
                    </button>
                </form>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-chart-pie"></i> Resumo do Mês</h3>
                </div>
                <div id="resumoMes">
                    <!-- Preenchido via JS -->
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title"><i class="fas fa-list"></i> Histórico de Despesas</h3>
                <div class="flex">
                    <input type="month" id="filtroMes" class="form-control" style="width: auto;">
                    <button class="btn btn-secondary" onclick="filtrarPorMes()">
                        <i class="fas fa-filter"></i> Filtrar
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table id="tabelaDespesas">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Categoria</th>
                            <th>Valor</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="despesasTableBody">
                        <!-- Preenchido via JS -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Rodapé - Acesso aos Desempenhos -->
        <div class="rodape-link">
            <a href="desempenhos.html?tab=financeiro">
                <i class="fas fa-chart-pie"></i> Desempenho financeiro →
            </a>
        </div>
    </div>

       <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/despesas.js"></script>
</body>
</html>
