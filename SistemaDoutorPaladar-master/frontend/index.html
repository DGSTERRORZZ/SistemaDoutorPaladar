<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doutor Paladar · Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #0b2b26 0%, #1b4332 50%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4);
            text-align: center;
        }
        .logo {
            margin-bottom: 2.5rem;
        }
        .logo i {
            font-size: 3.5rem;
            color: #ffb703;
            background: #1b4332;
            padding: 1.2rem;
            border-radius: 24px;
            margin-bottom: 1rem;
            display: inline-block;
        }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #1b4332;
        }
        .logo p {
            color: #555;
            font-weight: 500;
            margin-top: 0.25rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            background: white;
        }
        .input-group input:focus {
            border-color: #1b4332;
            outline: none;
            box-shadow: 0 0 0 4px rgba(27,67,50,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #1b4332;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: #0f2b22;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(27,67,50,0.4);
        }
        .error-message {
            background: #ffe3e3;
            color: #a61b1b;
            padding: 0.8rem;
            border-radius: 16px;
            margin-top: 1rem;
            display: none;
            font-weight: 500;
        }
        .support-info {
            text-align: center;
            margin-top: 2rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .support-info i {
            margin-right: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <h1>Doutor Paladar</h1>
                <p>Cantina · Instituto Federal</p>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Usuário</label>
                    <input type="text" id="username" placeholder="Digite seu usuário" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar no Sistema
                </button>
                <div id="errorMessage" class="error-message"></div>
            </form>
            <div class="support-info">
                <i class="fas fa-user-shield"></i> Acesso exclusivo: Pablo<br>
                <i class="fas fa-users"></i> Desenvolvido por: Victor, Valmir, Nicolas, Samuel e Jimenez
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const sucesso = await autenticarUsuario(username, password);
            if (sucesso) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').textContent = '❌ Credenciais inválidas';
            }
        });
    </script>
</body>
</html>
