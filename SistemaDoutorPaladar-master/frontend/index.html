<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doutor Paladar · Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float3d 8s ease-in-out infinite;
    }
    .bg-orb-1 { width: 400px; height: 400px; background: #0d9488; top: -100px; left: -100px; animation-delay: 0s; }
    .bg-orb-2 { width: 350px; height: 350px; background: #f59e0b; bottom: -80px; right: -80px; animation-delay: 2s; }
    .bg-orb-3 { width: 250px; height: 250px; background: #3b82f6; top: 50%; left: 60%; animation-delay: 4s; }

    .login-container {
      max-width: 460px;
      width: 100%;
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.8s ease-out;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 32px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.5),
                  0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #0d9488, #f59e0b, #3b82f6, #0d9488);
      background-size: 300% 100%;
      animation: gradient-shift 4s ease infinite;
    }

    .logo { margin-bottom: 2.5rem; }

    .logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 2.2rem;
      color: white;
      box-shadow: 0 15px 40px rgba(13, 148, 136, 0.4);
      animation: float3d 4s ease-in-out infinite;
      transform-style: preserve-3d;
      perspective: 500px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #e2e8f0, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    .logo p {
      color: #94a3b8;
      font-weight: 500;
      margin-top: 0.3rem;
      font-size: 0.9rem;
    }

    .input-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
    }

    .input-group input {
      width: 100%;
      padding: 1rem 1.2rem;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
      background: rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      backdrop-filter: blur(10px);
    }

    .input-group input::placeholder { color: #64748b; }

    .input-group input:focus {
      border-color: #0d9488;
      outline: none;
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }

    .btn-login {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #0d9488, #14b8a6);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-top: 0.5rem;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 8px 25px rgba(13, 148, 136, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
    }

    .btn-login:hover {
      transform: translateY(-3px) scale(1.01);
      box-shadow: 0 15px 40px rgba(13, 148, 136, 0.4);
    }

    .btn-login:active { transform: translateY(-1px) scale(0.99); }

    .error-message {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      display: none;
      font-weight: 600;
      font-size: 0.9rem;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .error-message.aviso {
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      border-color: rgba(245, 158, 11, 0.2);
    }

    .support-info {
      text-align: center;
      margin-top: 2rem;
      color: #475569;
      font-size: 0.82rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon"><i class="fas fa-utensils"></i></div>
        <h1>Doutor Paladar</h1>
        <p>Cantina · Instituto Federal</p>
      </div>

      <form id="loginForm">
        <div class="input-group">
          <label>Usuário</label>
          <input type="text" id="username" placeholder="Digite seu usuário" required autocomplete="username">
        </div>
        <div class="input-group">
          <label>Senha</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Entrar no Sistema</button>
        <div id="errorMessage" class="error-message"></div>
      </form>

      <div class="support-info">
        Acesso exclusivo: Pablo<br>
        Desenvolvido por: Victor, Valmir, Nicolas, Samuel e Jimenez
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    const msgExpiracao = sessionStorage.getItem('mensagemExpiracao');
    if (msgExpiracao) {
      sessionStorage.removeItem('mensagemExpiracao');
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.style.display = 'block';
      errorMsg.classList.add('aviso');
      errorMsg.textContent = msgExpiracao;
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = this.querySelector('.btn-login');
      btn.textContent = 'Entrando...';
      btn.disabled = true;

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const sucesso = await autenticarUsuario(username, password);

      if (sucesso) {
        btn.textContent = 'Redirecionando...';
        window.location.href = 'dashboard.html';
      } else {
        const errorMsg = document.getElementById('errorMessage');
        errorMsg.style.display = 'block';
        errorMsg.classList.remove('aviso');
        errorMsg.textContent = 'Credenciais inválidas';
        btn.textContent = 'Entrar no Sistema';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
