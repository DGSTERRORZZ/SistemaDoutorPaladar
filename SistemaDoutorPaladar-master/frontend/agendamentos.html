<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamentos · Doutor Paladar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .grade-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .slot-card { background: var(--bg-card); border-radius: var(--radius); padding: 1.2rem; text-align: center; box-shadow: var(--shadow-sm); border: 2px solid transparent; transition: var(--transition); cursor: pointer; position: relative; }
        .slot-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .slot-card.disponivel { border-color: var(--success); background: #e6f9f0; }
        .slot-card.poucas { border-color: var(--warning); background: #fff8e6; }
        .slot-card.lotado { border-color: var(--danger); background: #ffe8e8; opacity: 0.7; }
        .slot-card.bloqueado { border-color: var(--gray-600); background: var(--gray-100); opacity: 0.5; }
        .slot-horario { font-size: 1.3rem; font-weight: 700; color: var(--primary); margin-bottom: 0.3rem; }
        .slot-vagas { font-size: 0.95rem; font-weight: 600; }
        .slot-status { font-size: 0.85rem; margin-top: 0.3rem; }
        .slot-acoes { display: flex; gap: 0.3rem; margin-top: 0.5rem; justify-content: center; }
        .slot-acoes button { padding: 0.3rem 0.6rem; border-radius: 15px; border: none; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: var(--transition); }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--bg-card); border-radius: var(--radius); padding: 2rem; max-width: 500px; width: 90%; box-shadow: var(--shadow-lg); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-title">
                <h1><i class="fas fa-calendar-alt"></i> <span data-translate="agenda">Agendamentos</span></h1>
                <p>Doutor Paladar · Controle de Horários</p>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link"><i class="fas fa-chart-pie"></i> <span data-translate="dashboard">Dashboard</span></a>
                <a href="pdv.html" class="nav-link"><i class="fas fa-cash-register"></i> <span data-translate="pdv">PDV</span></a>
                <a href="estoque.html" class="nav-link"><i class="fas fa-box"></i> <span data-translate="estoque">Estoque</span></a>
                <a href="fiado.html" class="nav-link"><i class="fas fa-hand-holding-usd"></i> <span data-translate="fiado">Fiado</span></a>
                <a href="desempenhos.html" class="nav-link"><i class="fas fa-gauge-high"></i> <span data-translate="desempenhos">Desempenhos</span></a>
                <a href="despesas.html" class="nav-link"><i class="fas fa-receipt"></i> <span data-translate="despesas">Despesas</span></a>
                <a href="pedidos-admin.html" class="nav-link"><i class="fas fa-clipboard-list"></i> <span data-translate="pedidos">Pedidos</span></a>
                <a href="agendamentos.html" class="nav-link active"><i class="fas fa-calendar-alt"></i> <span data-translate="agenda">Agenda</span></a>
                <a href="fornecedores.html" class="nav-link"><i class="fas fa-truck"></i> <span data-translate="fornecedores">Fornecedores</span></a>
                <a href="configuracoes.html" class="nav-link"><i class="fas fa-cog"></i> <span data-translate="config">Config</span></a>
                <button class="btn btn-secondary btn-sm" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span data-translate="logout">Sair</span></button>
            </nav>
        </header>

        <main>
            <div class="card">
                <div class="card-header"><h3 class="card-title"><i class="fas fa-th"></i> Grade de Horários</h3><button class="btn btn-primary btn-sm" onclick="abrirModalNovo()"><i class="fas fa-plus"></i> Novo Horário</button></div>
                <div class="grade-grid" id="gradeHorarios"></div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalAgendamento">
        <div class="modal-box">
            <h3 id="modalTitulo"><i class="fas fa-clock"></i> Novo Horário</h3>
            <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
                <input type="hidden" id="agendamentoId">
                <div class="form-group"><label>Horário Início *</label><input type="time" id="horarioInicio" class="form-control" required></div>
                <div class="form-group"><label>Horário Fim *</label><input type="time" id="horarioFim" class="form-control" required></div>
                <div class="form-group"><label>Limite de Pedidos</label><input type="number" id="limitePedidos" class="form-control" value="10" min="1"></div>
                <div class="form-group"><label><input type="checkbox" id="bloqueado"> Bloquear este horário</label></div>
                <div class="flex" style="justify-content:flex-end;gap:0.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let agendamentos = [];
        if (!verificarAutenticacao()) window.location.href = 'index.html';
        async function carregarAgendamentos() {
            try {
                const res = await fetch('http://localhost:3000/api/agendamentos', { headers: { Authorization: `Bearer ${sessionStorage.getItem('token')}` } });
                agendamentos = await res.json(); renderGrade();
            } catch (e) { console.error('Erro ao carregar agendamentos:', e); }
        }
        function renderGrade() {
            const container = document.getElementById('gradeHorarios');
            if (!agendamentos.length) { container.innerHTML = '<p style="text-align:center;grid-column:1/-1;padding:2rem;">Nenhum horário cadastrado.</p>'; return; }
            container.innerHTML = agendamentos.map(a => {
                const vagas = a.limitePedidos - (a.pedidosHoje || 0);
                let classe = 'disponivel', statusTexto = `${vagas} vagas`;
                if (a.bloqueado) { classe = 'bloqueado'; statusTexto = 'Bloqueado'; }
                else if (vagas <= 0) { classe = 'lotado'; statusTexto = 'Lotado'; }
                else if (vagas <= 3) { classe = 'poucas'; statusTexto = `Poucas vagas (${vagas})`; }
                return `<div class="slot-card ${classe}"><div class="slot-horario">${a.horarioInicio}</div><div style="color:var(--text-secondary);">até ${a.horarioFim}</div><div class="slot-vagas">${statusTexto}</div><div class="slot-status">Limite: ${a.limitePedidos} pedidos</div><div class="slot-acoes"><button style="background:#cce5ff;color:#004085;" onclick="editarAgendamento(${a.id})"><i class="fas fa-edit"></i></button><button style="background:#ffe3e3;color:#a61b1b;" onclick="excluirAgendamento(${a.id})"><i class="fas fa-trash"></i></button></div></div>`;
            }).join('');
        }
        function abrirModalNovo() {
            document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-plus-circle"></i> Novo Horário';
            document.getElementById('formAgendamento').reset(); document.getElementById('agendamentoId').value = '';
            document.getElementById('modalAgendamento').classList.add('active');
        }
        function editarAgendamento(id) {
            const a = agendamentos.find(a => a.id === id); if (!a) return;
            document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-edit"></i> Editar Horário';
            document.getElementById('agendamentoId').value = a.id;
            document.getElementById('horarioInicio').value = a.horarioInicio;
            document.getElementById('horarioFim').value = a.horarioFim;
            document.getElementById('limitePedidos').value = a.limitePedidos;
            document.getElementById('bloqueado').checked = !!a.bloqueado;
            document.getElementById('modalAgendamento').classList.add('active');
        }
        function fecharModal() { document.getElementById('modalAgendamento').classList.remove('active'); }
        async function salvarAgendamento(event) {
            event.preventDefault();
            const id = document.getElementById('agendamentoId').value;
            const horarioInicio = document.getElementById('horarioInicio').value;
            const horarioFim = document.getElementById('horarioFim').value;
            const limitePedidos = parseInt(document.getElementById('limitePedidos').value);
            const bloqueado = document.getElementById('bloqueado').checked ? 1 : 0;
            if (!horarioInicio || !horarioFim) return alert('Preencha os horários!');
            try {
                const url = id ? `http://localhost:3000/api/agendamentos/${id}` : 'http://localhost:3000/api/agendamentos';
                const method = id ? 'PUT' : 'POST';
                await fetch(url, { method, headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${sessionStorage.getItem('token')}` }, body: JSON.stringify({ horarioInicio, horarioFim, limitePedidos, bloqueado }) });
                fecharModal(); carregarAgendamentos();
            } catch (e) { alert('Erro ao salvar.'); }
        }
        async function excluirAgendamento(id) {
            if (!confirm('Excluir este horário?')) return;
            try { await fetch(`http://localhost:3000/api/agendamentos/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${sessionStorage.getItem('token')}` } }); carregarAgendamentos(); } catch (e) { alert('Erro ao excluir.'); }
        }
        carregarAgendamentos();
    </script>
    <script src="js/settings.js"></script>
</body>
</html>
