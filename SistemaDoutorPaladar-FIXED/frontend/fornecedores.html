<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fornecedores · Doutor Paladar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #c8691a;
            --primary-dark: #a3510f;
            --primary-light: #e8832a;
            --bg: #1a1008;
            --card: #2a1a0a;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --success: #c8691a;
            --shadow-3d: 0 20px 40px rgba(0,0,0,0.4);
            --shadow-card: 0 8px 20px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 20px rgba(200,105,26,0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }
        
        /* Animações */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }
        
        /* Partículas */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: floatUp linear infinite; opacity: 0; }
        @keyframes floatUp { 0%{transform:translateY(110vh) scale(0);opacity:0} 10%{opacity:1} 90%{opacity:.6} 100%{transform:translateY(-10vh) scale(1);opacity:0} }
        
        /* Topbar */
        .topbar {
            background: rgba(10, 12, 16, 0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(200, 105, 26, 0.2);
            box-shadow: var(--shadow-3d);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        
        .logo span {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 8px 12px;
            border-radius: 12px;
            color: white;
            box-shadow: var(--shadow-glow);
        }
        
        .btn-back {
            background: rgba(200, 105, 26, 0.15);
            border: none;
            color: var(--primary);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: var(--shadow-glow);
        }
        
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(200,105,26,0.5); }
        .btn-sm { padding: 6px 14px; border-radius: 20px; background: rgba(200,105,26,0.15); border: none; color: var(--primary); cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-sm:hover { background: var(--primary); color: white; }
        .btn-danger { background: linear-gradient(135deg, var(--danger), #dc2626); color: white; border: none; }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
            z-index: 1;
        }
        
        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .stat-card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 20px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
            box-shadow: var(--shadow-card);
        }
        
        .stat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-3d); }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Grid de fornecedores */
        .fornecedores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.2rem;
        }
        
        .fornecedor-card {
            background: var(--card);
            border-radius: 20px;
            padding: 1.2rem;
            transition: all 0.3s;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(200, 105, 26, 0.1);
        }
        
        .fornecedor-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-3d);
            border-color: var(--primary);
        }
        
        .fornecedor-nome {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .fornecedor-info {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .fornecedor-info i { width: 20px; color: var(--primary); }
        .fornecedor-acoes { display: flex; gap: 8px; margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
        
        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--card);
            border-radius: 28px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            animation: fadeInUp 0.4s ease;
            border: 1px solid rgba(200, 105, 26, 0.3);
            position: relative;
        }
        .modal-box .close {
            position: absolute;
            top: 16px; right: 16px;
            background: none; border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .modal-box .close:hover { color: var(--danger); transform: rotate(90deg); }
        .modal-box h3 { color: var(--primary); margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(200,105,26,0.2); }
        
        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 3rem; color: var(--text-muted); }
        .loading i { font-size: 1.5rem; color: var(--primary); animation: spin 1s linear infinite; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state i { font-size: 4rem; opacity: 0.3; margin-bottom: 1rem; }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 20px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
            box-shadow: var(--shadow-3d);
        }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        
        @media (max-width: 768px) {
            .fornecedores-grid { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
            .topbar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="topbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <span><i class="fas fa-utensils"></i></span>
            Doutor Paladar
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn-back" onclick="window.location.href='admin.html'">
                <i class="fas fa-arrow-left"></i> Voltar
            </button>
            <button class="btn-primary" onclick="abrirModalFornecedor()">
                <i class="fas fa-plus"></i> Novo Fornecedor
            </button>
        </div>
    </div>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-value" id="totalFornecedores">0</div><div class="stat-label">Fornecedores</div></div>
            <div class="stat-card"><div class="stat-value" id="totalCompras">R$ 0</div><div class="stat-label">Total em Compras</div></div>
            <div class="stat-card"><div class="stat-value" id="ultimaCompra">--</div><div class="stat-label">Última Compra</div></div>
        </div>
        
        <!-- Lista de Fornecedores -->
        <div id="fornecedoresContainer" class="fornecedores-grid">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando fornecedores...</div>
        </div>
    </div>
    
    <!-- Modal Fornecedor -->
    <div class="modal-overlay" id="modalFornecedor">
        <div class="modal-box">
            <button class="close" onclick="fecharModal()">&times;</button>
            <h3 id="modalTitulo">Novo Fornecedor</h3>
            <form id="formFornecedor" onsubmit="salvarFornecedor(event)">
                <input type="hidden" id="fornecedorId">
                <div class="form-group"><label>Nome *</label><input type="text" id="nomeFor" required placeholder="Nome do fornecedor"></div>
                <div class="form-group"><label>CNPJ</label><input type="text" id="cnpjFor" placeholder="00.000.000/0000-00"></div>
                <div class="form-group"><label>Telefone</label><input type="tel" id="telFor" placeholder="(00) 00000-0000"></div>
                <div class="form-group"><label>E-mail</label><input type="email" id="emailFor" placeholder="contato@fornecedor.com"></div>
                <div class="form-group"><label>Endereço</label><input type="text" id="endFor" placeholder="Rua, número, bairro, cidade"></div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 0.5rem;">Salvar</button>
            </form>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        let fornecedores = [];

        function dadosFornecedoresCantina() {
            return [
                { id: 1, nome: 'JB Distribuidora de Bebidas e Alimentos', cnpj: '17.722.006/0001-75', telefone: '(35) 9989-7499', email: '', endereco: 'Estrada Municipal da Urtiga, 1 – São Bento do Sapucaí/SP' },
                { id: 2, nome: 'Marosa Distribuidora', cnpj: '41.993.234/0001-64', telefone: '', email: '', endereco: 'Av. Califórnia, 387 – Jardim Califórnia, Jacareí/SP – CEP 12305-670' },
                { id: 3, nome: 'Flavio Francisco da Mata – Salgados (Vhsys)', cnpj: '11.541.868/0001-15', telefone: '(12) 3662-4241', email: 'flaviodamata2008@hotmail.com', endereco: 'R. Brigadeiro Jordão, 995 Loja 1 – Vila Abernéssia, Campos do Jordão/SP' },
                { id: 4, nome: 'Pablo / José Luiz de Silva – Geladão de Açaí', cnpj: '', telefone: '(12) 99610-9823', email: '', endereco: 'Campos do Jordão/SP' },
                { id: 5, nome: 'Camarão Distribuidor – Polpas Naturais Tropical', cnpj: '', telefone: '(12) 99618-1141', email: '', endereco: 'Campos do Jordão/SP' }
            ];
        }
        
        // Verificar se é admin
        if(!sessionStorage.getItem('admin_logado')) {
            window.location.href = 'index.html';
        }
        
        async function carregarFornecedores() {
            const container = document.getElementById('fornecedoresContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando fornecedores...</div>';
            
            try {
                const res = await fetch(API_URL + '/fornecedores', {
                    headers: { Authorization: `Bearer ${sessionStorage.getItem('token') || ''}` }
                });
                
                if(res.ok) {
                    fornecedores = await res.json();
                } else {
                    fornecedores = dadosFornecedoresCantina();
                }
                atualizarStats();
                renderizarFornecedores();
            } catch(e) {
                console.error('Erro ao carregar fornecedores:', e);
                fornecedores = dadosFornecedoresCantina();
                atualizarStats();
                renderizarFornecedores();
            }
        }
        
        function atualizarStats() {
            document.getElementById('totalFornecedores').textContent = fornecedores.length;
            const totalCompras = fornecedores.length * 1250;
            document.getElementById('totalCompras').textContent = `R$ ${totalCompras.toFixed(2)}`;
            const hoje = new Date();
            document.getElementById('ultimaCompra').textContent = hoje.toLocaleDateString('pt-BR');
        }
        
        function renderizarFornecedores() {
            const container = document.getElementById('fornecedoresContainer');
            
            if(fornecedores.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-truck"></i><h3>Nenhum fornecedor cadastrado</h3><p>Clique em "Novo Fornecedor" para começar</p></div>`;
                return;
            }
            
            container.innerHTML = fornecedores.map(f => `
                <div class="fornecedor-card fade-in-up">
                    <div class="fornecedor-nome"><i class="fas fa-building"></i> ${f.nome}</div>
                    ${f.cnpj ? `<div class="fornecedor-info"><i class="fas fa-id-card"></i> ${f.cnpj}</div>` : ''}
                    ${f.telefone ? `<div class="fornecedor-info"><i class="fas fa-phone"></i> ${f.telefone}</div>` : ''}
                    ${f.email ? `<div class="fornecedor-info"><i class="fas fa-envelope"></i> ${f.email}</div>` : ''}
                    ${f.endereco ? `<div class="fornecedor-info"><i class="fas fa-map-marker-alt"></i> ${f.endereco}</div>` : ''}
                    <div class="fornecedor-acoes">
                        <button class="btn-sm" onclick="editarFornecedor(${f.id})"><i class="fas fa-edit"></i> Editar</button>
                        <button class="btn-sm" onclick="excluirFornecedor(${f.id})"><i class="fas fa-trash"></i> Excluir</button>
                    </div>
                </div>
            `).join('');
        }
        
        function abrirModalFornecedor() {
            document.getElementById('modalTitulo').textContent = 'Novo Fornecedor';
            document.getElementById('formFornecedor').reset();
            document.getElementById('fornecedorId').value = '';
            document.getElementById('modalFornecedor').classList.add('active');
        }
        
        function editarFornecedor(id) {
            const f = fornecedores.find(x => x.id === id);
            if(!f) return;
            document.getElementById('modalTitulo').textContent = 'Editar Fornecedor';
            document.getElementById('fornecedorId').value = f.id;
            document.getElementById('nomeFor').value = f.nome;
            document.getElementById('cnpjFor').value = f.cnpj || '';
            document.getElementById('telFor').value = f.telefone || '';
            document.getElementById('emailFor').value = f.email || '';
            document.getElementById('endFor').value = f.endereco || '';
            document.getElementById('modalFornecedor').classList.add('active');
        }
        
        function fecharModal() { document.getElementById('modalFornecedor').classList.remove('active'); }
        
        async function salvarFornecedor(event) {
            event.preventDefault();
            const id = document.getElementById('fornecedorId').value;
            const fornecedor = {
                nome: document.getElementById('nomeFor').value.trim(),
                cnpj: document.getElementById('cnpjFor').value.trim(),
                telefone: document.getElementById('telFor').value.trim(),
                email: document.getElementById('emailFor').value.trim(),
                endereco: document.getElementById('endFor').value.trim()
            };
            
            if(!fornecedor.nome) {
                mostrarToast('Nome é obrigatório!', 'error');
                return;
            }
            
            const headers = { 'Content-Type': 'application/json', Authorization: `Bearer ${sessionStorage.getItem('token') || ''}` };
            try {
                if(id) {
                    await fetch(API_URL + '/fornecedores/' + id, { method: 'PUT', headers, body: JSON.stringify(fornecedor) });
                    mostrarToast('Fornecedor atualizado!', 'success');
                } else {
                    await fetch(API_URL + '/fornecedores', { method: 'POST', headers, body: JSON.stringify(fornecedor) });
                    mostrarToast('Fornecedor cadastrado!', 'success');
                }
            } catch(e) { mostrarToast('Erro ao salvar fornecedor', 'error'); }
            fecharModal();
            await carregarFornecedores();
        }
        
        async function excluirFornecedor(id) {
            if(!confirm('Tem certeza que deseja excluir este fornecedor?')) return;
            try {
                await fetch(API_URL + '/fornecedores/' + id, {
                    method: 'DELETE',
                    headers: { Authorization: `Bearer ${sessionStorage.getItem('token') || ''}` }
                });
                mostrarToast('Fornecedor excluído!', 'success');
            } catch(e) { mostrarToast('Erro ao excluir fornecedor', 'error'); }
            await carregarFornecedores();
        }
        
        function mostrarToast(mensagem, tipo) {
            const toast = document.createElement('div');
            toast.className = `toast ${tipo}`;
            toast.innerHTML = `<i class="fas fa-${tipo === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${mensagem}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Fechar modal clicando fora
        document.getElementById('modalFornecedor').addEventListener('click', (e) => {
            if(e.target === document.getElementById('modalFornecedor')) fecharModal();
        });
        
        // Partículas
        (function(){
            const c=document.getElementById('particles');
            for(let i=0;i<15;i++){
                const p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.width=p.style.height=(Math.random()*4+2)+'px';
                p.style.background=`rgba(200,105,26,${Math.random()*0.3+0.1})`;
                p.style.animationDuration=(Math.random()*14+10)+'s';
                p.style.animationDelay=(Math.random()*8)+'s';
                c.appendChild(p);
            }
        })();
        
        carregarFornecedores();
    </script>
</body>
</html>
